services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tra-postgres
    environment:
      POSTGRES_DB: traassist
      POSTGRES_USER: trauser
      POSTGRES_PASSWORD: trapass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: